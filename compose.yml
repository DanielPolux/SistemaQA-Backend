name: sistema-qa

services:

  postgres:
    image: postgres:16-alpine
    container_name: sqa_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sistema_qa
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sistema_qa"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./SistemaQA-Backend
      dockerfile: Dockerfile.dev
    container_name: sqa_backend
    env_file: ./SistemaQA-Backend/.env
    environment:
      DB_HOST: postgres
      DB_SYNC: "false"
    volumes:
      - ./SistemaQA-Backend/src:/app/src:delegated
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./SistemaQA
      dockerfile: Dockerfile.dev
    container_name: sqa_frontend
    volumes:
      - ./SistemaQA/src:/app/src:delegated
    ports:
      - "4200:4200"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
